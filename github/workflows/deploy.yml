name: Deploy Website with Secret Token

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Create config file with gist_token
        run: |
          echo "// Auto-generated config file - DO NOT EDIT" > config.js
          echo "const GITHUB_TOKEN = '${{ secrets.gist_token }}';" >> config.js
          echo "console.log('✅ Config loaded with token');" >> config.js
          echo "console.log('Token length:', GITHUB_TOKEN.length);" >> config.js
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
